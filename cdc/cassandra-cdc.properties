# Debezium Cassandra-5 connector — reference config.
# Reads Cassandra's commit-log CDC (cdc_raw hard-links) and publishes row-level
# mutations to Kafka topics: <topic.prefix>.<keyspace>.<table>
#   e.g. stockcdc.market.ohlc_bars
connector.name=stock-cdc
cassandra.config=/opt/homebrew/etc/cassandra/cassandra.yaml
cassandra.hosts=127.0.0.1
cassandra.port=9042
commit.log.relocation.dir=/tmp/debezium/relocation
commit.log.real.time.processing.enabled=true
http.port=8040
kafka.producer.bootstrap.servers=localhost:9092
topic.prefix=stockcdc
offset.backing.store.dir=/tmp/debezium/offsets
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false
